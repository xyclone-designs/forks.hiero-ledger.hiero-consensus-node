option csharp_namespace = "Hedera.Hashgraph.Proto.Services.Auxiliary.History";
option java_package = "com.hedera.hashgraph.proto.services.auxiliary.history";
// <<<pbj.java_package = "com.hedera.hashgraph.proto.services.auxiliary.history">>> This comment is special code for setting PBJ Compiler java package

option java_multiple_files = true;

import "services/state/history/history_types.proto";

/**
 * A transaction body to publish a node's history proof key.
 */
message HistoryProofKeyPublicationTransactionBody {
  oneof data {
    /**
     * The proof key the submitting node intends to use when
     * contributing WRAPS messages for use in proving history
     * belongs to the chain of trust for the ledger id.
     */
    bytes proof_key = 1;

    /**
     * A WRAPS message from the submitting node.
     */
    bytes wraps_message = 2;
  }

  /**
   * The id of the proof construction this publication is for.
   */
  uint64 construction_id = 3;

  /**
   * The phase of the proof construction this key is being
   * published for.
   * The proof key the submitting node intends to use when
   * contributing signatures for use in proving history
   * belongs to the chain of trust for the ledger id.
   */
  proto.services.state.history.WrapsPhase phase = 4;
}
