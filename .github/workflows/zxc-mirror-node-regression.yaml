# SPDX-License-Identifier: Apache-2.0
name: "ZXC: Mirror Node Regression"
on:
  workflow_call:
    inputs:
      ref:
        description: "The branch, tag, or SHA to checkout"
        required: false
        type: string
      custom-job-name:
        description: "The custom job name to use for the job"
        required: false
        type: string
      solo-version:
        description: "The version of solo to install (if not specified, latest will be used)"
        required: false
        type: string
      helm-release-name:
        description: "The Helm release name to use for the mirror node deployment"
        required: false
        type: string
      mirror-node-version:
        description: "The version of the mirror node to deploy (if not specified, '0.145.2' will be used)"
        required: false
        type: string
    secrets:
      access-token:
        description: "GitHub Access Token with write permissions to the repository"
        required: true
      slack-detailed-report-webhook:
        description: "Slack Webhook URL for TCK Monitoring"
        required: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  SOLO_CLUSTER_NAME: "solo-mirror-node-e2e"
  SOLO_NAMESPACE: "solo-mirror-node-e2e"
  SOLO_DEPLOYMENT: "solo-mirror-node-deployment"
  SOLO_CLUSTER_SETUP_NAMESPACE: "solo-setup"
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew

jobs:
  # Execute Mirror Node Regression Tests using specified version of hiero-consensus-node
  mirror-node-regression:
    name: ${{ inputs.custom-job-name || 'Standard' }}
    runs-on: hl-cn-mn-regression-lin-lg
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout Consensus Node
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || '' }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 25

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Setup NodeJS Environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: false

      - name: Build hiero-consensus-node
        run: ${GRADLE_EXEC} assemble

      - name: Install Solo
        run: npm install -g @hiero-ledger/solo@${{ inputs.solo-version || 'latest' }}

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Configure and run solo
        id: run-solo
        env:
          MIRROR_NODE_VERSION: ${{ inputs.mirror-node-version || '0.145.2' }}
        run: |
          set -ex
          cat <<EOF > mirror.yml
          test:
            annotations:
              helm.sh/hook-delete-policy: before-hook-creation
            env:
              HIERO_MIRROR_TEST_ACCEPTANCE_NETWORK: OTHER
            cucumberTags: "@acceptance and not @estimateprecompile"
            enabled: true
          EOF
          kind create cluster -n "${SOLO_CLUSTER_NAME}"

          # initialize solo
          solo init

          # check solo version
          version=$(solo --version | grep Version | awk '{print $3}')
          solo_ge_0440=$([[ "$(printf '%s\n' "${version}" "0.44.0" | sort -V | head -n1)" == "0.44.0" ]] && echo "true" || echo "false")
          echo "::debug::solo_ge_0440=${solo_ge_0440}"
          echo "::debug::MIRROR_NODE_VERSION=${MIRROR_NODE_VERSION}"
          if [[ "${solo_ge_0440}" == "true" ]]; then
            echo "::debug::Solo version ($version) is >= 0.44.0"
            solo cluster-ref config connect --cluster-ref "kind-${SOLO_CLUSTER_NAME}" --context "kind-${SOLO_CLUSTER_NAME}"
            solo deployment config create -n "${SOLO_NAMESPACE}" --deployment "${SOLO_DEPLOYMENT}"
            solo deployment cluster attach --deployment "${SOLO_DEPLOYMENT}" --cluster-ref "kind-${SOLO_CLUSTER_NAME}" --num-consensus-nodes 1
            solo keys consensus generate --gossip-keys --tls-keys -i node1 --deployment "${SOLO_DEPLOYMENT}"
            solo cluster-ref config setup --cluster-ref "kind-${SOLO_CLUSTER_NAME}" -s "${SOLO_CLUSTER_SETUP_NAMESPACE}"
            solo consensus network deploy -i node1 --deployment "${SOLO_DEPLOYMENT}"
            solo consensus node setup -i node1 --deployment "${SOLO_DEPLOYMENT}" --local-build-path ./hedera-node/data
            solo consensus node start -i node1 --deployment "${SOLO_DEPLOYMENT}"
            solo mirror node add --deployment "${SOLO_DEPLOYMENT}" --cluster-ref "kind-${SOLO_CLUSTER_NAME}" --pinger --values-file mirror.yml
          else
            echo "::debug::Solo version ($version) is < 0.44.0"
            solo cluster-ref connect --cluster-ref "kind-${SOLO_CLUSTER_NAME}" --context "kind-${SOLO_CLUSTER_NAME}"
            solo deployment create -n "${SOLO_NAMESPACE}" --deployment "${SOLO_DEPLOYMENT}"
            solo deployment add-cluster --deployment "${SOLO_DEPLOYMENT}" --cluster-ref "kind-${SOLO_CLUSTER_NAME}" --num-consensus-nodes 1
            solo node keys --gossip-keys --tls-keys -i node1 --deployment "${SOLO_DEPLOYMENT}"
            solo cluster-ref setup --cluster-ref "kind-${SOLO_CLUSTER_NAME}" -s "${SOLO_CLUSTER_SETUP_NAMESPACE}"
            solo network deploy -i node1 --deployment "${SOLO_DEPLOYMENT}"
            solo node setup -i node1 --deployment "${SOLO_DEPLOYMENT}" --local-build-path ./hedera-node/data
            solo node start -i node1 --deployment "${SOLO_DEPLOYMENT}"
            solo mirror-node deploy --deployment "${SOLO_DEPLOYMENT}" --cluster-ref "kind-${SOLO_CLUSTER_NAME}" --pinger --values-file mirror.yml
          fi

          echo "solo-ge-0440=${solo_ge_0440}" >> "${GITHUB_OUTPUT}"

      - name: Execute mirror node acceptance tests
        env:
          HELM_RELEASE_NAME: ${{ inputs.helm-release-name || 'mirror-1' }}
        run: |
          if [[ "${{ steps.run-solo.outputs.solo-ge-0440 }}" == "true" ]]; then
            helm test ${HELM_RELEASE_NAME} -n "${SOLO_NAMESPACE}" --filter name="${HELM_RELEASE_NAME}-mirror-acceptance" --logs  --timeout 20m
          else
            helm test ${HELM_RELEASE_NAME} -n "${SOLO_NAMESPACE}" --filter name="${HELM_RELEASE_NAME}-acceptance" --logs  --timeout 20m
          fi

      - name: Stop Solo
        continue-on-error: true
        if: ${{ always() }}
        run: |
          kind delete cluster -n ${{ env.SOLO_CLUSTER_NAME }}

  report-mirror-node-regression-status:
    name: ${{ inputs.custom-job-name || 'Standard' }} Slack Report
    runs-on: hl-cn-mn-regression-lin-sm
    needs:
      - mirror-node-regression
    permissions:
      id-token: write
    if: ${{ always() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Build Slack Payload Message
        id: payload
        run: |
          COLOR="#FF0000"
          if [[ "${{ needs.mirror-node-regression.result }}" == "success" ]]; then
            COLOR="#00FF00"
          elif [[ "${{ needs.mirror-node-regression.result }}" == "cancelled" ]]; then
            COLOR="#555555"
          fi
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":vertical_traffic_light: Hiero Consensus Node - Mirror Node Regression Test Report",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Mirror Node Regression Panel was executed. See status below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Mirror Node Regression Panel Result"
                      },
                      {
                        "type": "plain_text",
                        "text": "${{ needs.mirror-node-regression.result }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow and Commit Information*"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Source Commit*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.ref }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run ID*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": " ${{ github.run_id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run URL*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Report Status to Detailed Test Reports Channel
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.slack-detailed-report-webhook }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
