  # Send this output back to the caller workflow
  longevity-test-reconnect:
    name: Reconnect test
    runs-on: hl-cn-sdlt-lin-lg
    if: ${{ !cancelled() }}
    needs:
      - longevity-tests-start
      - longevity-tests-finish
    outputs:
      ReconnectStatus: ${{ steps.reconnect-status.outputs.value }}
    steps:
      - name: Check Test Asset
        id: set-k8s-cluster
        run: |
          K8S_CLUSTER="k8s.pft.dal.lat.ope.eng.hashgraph.io"
          if [[ "${{ inputs.test-asset }}" =~ ^AdHoc(SD)?[0-9]+$ ]]; then
            K8S_CLUSTER="k8s.pft.chi.lat.ope.eng.hashgraph.io"
          fi
          echo "kubernetes-cluster=${K8S_CLUSTER}" >> "${GITHUB_OUTPUT}"

      - name: Install KubeCtl
        uses: step-security/setup-kubectl@2edbf6aff97d814e9dc52827498ac51fe972e6d0 # v4.0.0
        with:
          version: v1.33.0

      - name: Install Teleport Client
        uses: teleport-actions/setup@176c25dfcd19cd31a252f275d579822b243e7b9c # v1.0.6
        with:
          version: 18.4.0

      - name: Authorize Teleport SSH Access
        id: auth-ssh
        uses: teleport-actions/auth@685adaf480dc79262a99220eb158a92136d5abd9 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          certificate-ttl: 24h

      - name: Authorize Teleport K8S Access
        id: auth-k8s
        uses: teleport-actions/auth-k8s@677da98eaa78a5e649d4c5b4012750af4c28af73 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          kubernetes-cluster: ${{ needs.longevity-tests-start.outputs.kubernetes-cluster }}
          certificate-ttl: 24h

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: "projects/716789254648/locations/global/workloadIdentityPools/perf-eng-reports-pool/providers/gh-provider"
          service_account: "gh-perf-report-writer@perf-engineering-reports.iam.gserviceaccount.com"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}

      - name: Create report dir
        shell: bash
        run: |
          mkdir "${{ github.workspace }}"/report

      - name: Start Longevity test
        run: |
          run_NLGDebugparams="-Dorg.slf4j.simpleLogger.defaultLogLevel=debug" # e.g. -Dorg.slf4j.simpleLogger.defaultLogLevel=debug
          nlgpod=`sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" get pods | grep nlg-network-load-generator | awk '{print $1}'`
          n=`expr ${{ inputs.nlg-accounts }} / 1000`
          NLG_c=32

          test=LongevityLoadTest

          NLGargs="-K ECDSA -R -c ${NLG_c} -a ${{ inputs.nlg-accounts }}  -n ${n} -T 1000 -S hot -p 50"

          echo kubectl -n "${{ needs.longevity-tests-start.outputs.namespace }}" exec ${nlgpod} -c nlg -- bash -c "nohup /usr/bin/env java -Xmx30g \
            ${run_NLGDebugparams} -cp /app/lib/*:\$(ls -1 /app/network-load-generator-*.jar) com.hedera.benchmark.${test} \
            ${NLGargs} -tt ${{ inputs.nlg-time }}m > client.log 2>&1 &"

          kubectl -n "${{ needs.longevity-tests-start.outputs.namespace }}" exec ${nlgpod} -c nlg -- bash -c "nohup /usr/bin/env java -Xmx30g \
            ${run_NLGDebugparams} -cp /app/lib/*:\$(ls -1 /app/network-load-generator-*.jar) com.hedera.benchmark.${test} \
            ${NLGargs} -tt ${{ inputs.nlg-time }}m > client.log 2>&1 &"
          sleep 30

      - name: Start Reconnect
        id: reconnect-status
        run: |
          set +x
          set +e

          downtime=$(expr ${{ inputs.reconnect-uptime }} \* 3)
          warmtime=${{ inputs.reconnect-uptime }}
          NofLoops=3
          result=13

          nlgpod="$(sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" get pods | grep nlg-network-load-generator | awk '{print $1}')"
          mkdir -p "${{ github.workspace }}"/report/reconnect
          bash "${{ github.workspace }}"/.github/workflows/support/citr/profileReconnectLoopK8s.sh "${{ needs.longevity-tests-start.outputs.namespace }}" ${downtime} ${warmtime} ${NofLoops} 2>&1 | tee "${{ github.workspace }}"/report/reconnect/reconnect.log

          nlgpod=`sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" get pods | grep nlg-network-load-generator | awk '{print $1}'`
          kubectl -n "${{ needs.longevity-tests-start.outputs.namespace }}" exec ${nlgpod} -c nlg -- bash -c "tail -n 20 /app/client.log"
          kubectl -n "${{ needs.longevity-tests-start.outputs.namespace }}" exec ${nlgpod} -c nlg -- bash -c "ps -aef" | grep 'com.hedera.benchmark'
          result=$?

          if [ ${result} -ne 0 ]
          then
            echo "Failure: Reconnect finished after LoadTest"
            echo "value=${result}" >> "${GITHUB_OUTPUT}"
          else
            echo "Check for status of loop N=${NofLoops}:"
            grep -E "Reconnect N=${NofLoops} done" "${{ github.workspace }}"/report/reconnect/reconnect.log
            result=$?
            echo "value=${result}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run Validator after Reconnect
        id: validator-status
        run: |
          set +x
          set +e
          kubectl -n "${{ needs.longevity-tests-start.outputs.namespace }}" \
            exec -it network-node1-0 -c root-container -- bash -c "cd /opt/hgcapp/services-hedera/HapiApp2.0; sh checkValidatorNode.sh 0" 2>&1 | tee "${{ github.workspace }}"/report/reconnect/validator_status.log
          sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" \
            cp network-node1-0:/opt/hgcapp/services-hedera/HapiApp2.0/data/saved/validation.tmp/validator.log "${{ github.workspace }}"/report/reconnect/validator.log
          sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" \
            cp network-node1-0:/opt/hgcapp/services-hedera/HapiApp2.0/data/saved/validation.tmp/validatorRun.log "${{ github.workspace }}"/report/reconnect/validatorRun.log
          cat "${{ github.workspace }}"/report/reconnect/validator_status.log
          grep -E 'validation .* is OK' "${{ github.workspace }}"/report/reconnect/validator_status.log

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: "projects/716789254648/locations/global/workloadIdentityPools/perf-eng-reports-pool/providers/gh-provider"
          service_account: "gh-perf-report-writer@perf-engineering-reports.iam.gserviceaccount.com"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2

      - name: Copy logs
        run: |
          nlgpod="$(sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" get pods | grep nlg-network-load-generator| awk '{print $1}')"

          sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" cp ${nlgpod}:/app/client.log "${{ github.workspace }}"/report/reconnect/client.log
          cat "${{ github.workspace }}"/report/client.log | perl -pne '~s/\b([A-Z_]+[\:]\d+)\b/\n$1\n/g' | perl "${{ github.workspace }}"/.github/workflows/support/citr/collectNLG_Errors.pl > "${{ github.workspace }}"/report/reconnect/client.stats.txt
          sh "${{ github.workspace }}"/.github/workflows/support/citr/getClusterErrors.sh "${{ needs.longevity-tests-start.outputs.namespace }}"
          sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt -n "${{ needs.longevity-tests-start.outputs.namespace }}" cp ${nlgpod}:/app/version_run.txt "${{ github.workspace }}"/report/reconnect/version_run.txt
          cp -r podlog_"${{ needs.longevity-tests-start.outputs.namespace }}" "${{ github.workspace }}"/report/reconnect/

      - name: Publish logs
        if: ${{ !cancelled() }}
        run: |
          cd "${{ github.workspace }}"/

          gcloud --no-user-output-enabled storage ls gs://performance-engineering-reports 2>/dev/null | grep permanent >/dev/null 2>&1
          if [[ ${?} -ne 0 ]]
          then
            sleep 10
            gcloud --no-user-output-enabled storage ls gs://performance-engineering-reports | grep permanent >/dev/null
          fi

          gcloud --no-user-output-enabled storage cp --recursive report "${{ env.GS_ROOT_DIR }}/${{ inputs.ref }}_${{ inputs.test-asset }}_${{ github.run_number }}/report/reconnect"
          echo Done: see results in "${{ env.GS_ROOT_HTTPS }}/${{ inputs.ref }}_${{ inputs.test-asset }}_${{ github.run_number }}/report/reconnect"

      - name: Delete namespace
        if: ${{ inputs.delete-namespace == true }}
        run: |
          sh "${{ github.workspace }}"/.github/workflows/support/citr/kubectlt delete namespace "${{ needs.longevity-tests-start.outputs.namespace }}"

  # Send this output back to the caller workflow
  single-day-longevity-test-result:
    name: Calculate Result
    runs-on: hl-cn-sdlt-lin-lg
    if: ${{ !cancelled() }}
    needs:
      - longevity-tests-start
      - longevity-tests-finish
      - longevity-test-reconnect
    outputs:
      result: ${{ steps.sdlt-status.outputs.result }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Set output
        id: sdlt-status
        run: |
          RESULT="failure"
          NFT="${{ needs.longevity-tests-finish.outputs.NFTscore }}"
          HELI="${{ needs.longevity-tests-finish.outputs.Heliscore }}"
          CRYPTO="${{ needs.longevity-tests-finish.outputs.Cryptoscore }}"
          HCS="${{ needs.longevity-tests-finish.outputs.HCSscore }}"
          SMART="${{ needs.longevity-tests-finish.outputs.Smartscore }}"
          VALIDATOR="${{ needs.longevity-tests-finish.outputs.ValidatorStatus }}"
          RECONNECT="${{ needs.longevity-test-reconnect.outputs.ReconnectStatus }}"

          # Check if any variable is empty. If it is, we set the result to failure.
          if [[ -z "${NFT}" ]] || [[ -z "${HELI}" ]] || [[ -z "${CRYPTO}" ]] || [[ -z "${HCS}" ]] || [[ -z "${SMART}" ]] || [[ "${VALIDATOR}" != "0" ]] || [[ "${RECONNECT}" != "0" ]]; then
            RESULT="failure"
          else
            RESULT="success"
          fi

          echo "## Single Day Longevity Result" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "result=${RESULT}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "result=${RESULT}" >> "${GITHUB_OUTPUT}"

          echo "## Individual Results" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- NftTransferLoadTest TPS: ${NFT}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- HeliSwapLoadTest TPS: ${HELI}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- CryptoTransferLoadTest TPS: ${CRYPTO}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- HCSLoadTest TPS: ${HCS}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- SmartContractLoadTest TPS: ${SMART}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- Validator: ${VALIDATOR}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "- Reconnect: ${RECONNECT}" | tee -a "${GITHUB_STEP_SUMMARY}"

  longevity-report-failures:
    name: Report Failures
    runs-on: hl-cn-sdlt-lin-sm
    needs:
      - longevity-tests-start
      - longevity-tests-wait
      - longevity-tests-finish
      - longevity-test-reconnect
      - single-day-longevity-test-result
    if: ${{ (needs.longevity-tests-finish.result != 'success' ||
      needs.single-day-longevity-test-result.result != 'success' ||
      needs.longevity-test-reconnect.result != 'success') &&
      !cancelled() && always() }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Build Summary Details
        id: summary
        run: |
          title="The Single Day Longevity Test workflow failed (SDLT ${{ inputs.test-asset }} - ${{ inputs.ref }})"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          {
            echo 'summary<<EOF'
            echo "------------------------------------"
            echo "Status of each jobs:"
            echo "- Longevity Tests Start: ${{ needs.longevity-tests-start.result }}"
            echo "- Longevity Tests Wait: ${{ needs.longevity-tests-wait.result }}"
            echo "- Longevity Tests Finish: ${{ needs.longevity-tests-finish.result }}"
            echo "- Single Day Longevity Test Result: ${{ needs.single-day-longevity-test-result.result }}"
            echo "------------------------------------"
            echo "Commit information:"
            echo "- Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.longevity-tests-start.outputs.commit-sha }}>"
            echo "- Workflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Log Job Summary
        run: |
          echo "## Rootly Summary" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "### Title: ${{ steps.summary.outputs.title }}" | tee -a "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.summary.outputs.summary }}" | tee -a "${GITHUB_STEP_SUMMARY}"

  longevity-report-to-slack:
    runs-on: hl-cn-sdlt-lin-sm
    needs:
      - longevity-tests-finish
      - single-day-longevity-test-result
      - longevity-test-reconnect

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Clean branch or tag name from input.ref
        id: clean-branch-name
        run: |
          raw_ref="${{ inputs.ref }}"
          echo "Raw input ref: ${raw_ref}"
          clean_ref=""

          if [[ "${raw_ref}" == refs/heads/* ]]; then
            clean_ref="${raw_ref#refs/heads/}"
          elif [[ "${raw_ref}" == refs/tags/* ]]; then
            clean_ref="${raw_ref#refs/tags/}"
          elif [[ "${raw_ref}" == refs/pull/*/merge ]]; then
            clean_ref="PR-${raw_ref#refs/pull/}"
            clean_ref="${clean_ref%/merge}"
          fi

          echo "clean_ref=${clean_ref}" >> "${GITHUB_OUTPUT}"

      - name: Build Slack Payload Message
        id: payload
        run: |

          report="\
            NftTransferLoadTest ${{ needs.longevity-tests-finish.outputs.NFTscore }} \n\
            HCSLoadTest ${{ needs.longevity-tests-finish.outputs.HCSscore }} \n\
            CryptoTransferLoadTest ${{ needs.longevity-tests-finish.outputs.Cryptoscore }} \n\
            HeliSwapLoadTest ${{ needs.longevity-tests-finish.outputs.Heliscore }}\n\
            SmartContractLoadTest ${{ needs.longevity-tests-finish.outputs.Smartscore }}"

          if [[ "${{ needs.longevity-tests-finish.outputs.ValidatorStatus }}" == "0" ]]
          then
            Validator="PASSED"
          else
            Validator="FAILED"
          fi

          if [[ "${{ needs.longevity-test-reconnect.outputs.ReconnectStatus }}" == "0" ]]
          then
            Reconnect="PASSED"
          else
            Reconnect="FAILED"
          fi

          #last line is 5, it does not need comma block separator
          freport=`/usr/bin/echo -e "$report" | awk '{print $1" "$2}'| perl -ne 'if ($. < 5) {$comma=","} else {$comma="";} ($t,$d)=split(/\s+/,$_,2);printf("{\"type\": \"text\",\"text\": \"%-25s %7d \\\n\"}%s",$t,$d,$comma);'`
          freport="{\"type\": \"text\",\"text\": \"Name                          TPS\n\"},${freport},\
           {\"type\": \"text\",\"text\": \"ValidatorTest ${Validator}\n\"},
           {\"type\": \"text\",\"text\": \"ReconnectTest ${Reconnect}\"}"

          COLOR="#FF0000"
          if [[ "${{ needs.single-day-longevity-test-result.outputs.result }}" == "success" ]]; then
            COLOR="#00FF00"
          elif [[ "${{ needs.single-day-longevity-test-result.outputs.result }}" == "cancelled" ]]; then
            COLOR="#555555"
          fi

          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "NLG Longevity Test Report (SDLT) - ${{ steps.clean-branch-name.outputs.clean_ref }}",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                      "type": "rich_text",
                      "elements": [
                        {
                          "type": "rich_text_preformatted",
                          "elements": [
                            ${freport}
                          ]
                        }
                      ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow and Commit Information*"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run ID*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": " ${{ github.run_id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Version*: ${{ inputs.ref }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      ## Slack notifications
      - name: Report status (slack detailed reports)
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          webhook: ${{ secrets.slack-report-webhook }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
