# SPDX-License-Identifier: Apache-2.0
name: "ZXCron: [CITR] Promote Build Candidate"
on:
  workflow_dispatch:
  schedule:
    # Runs Promote Build Candidate at 0100 hours UTC Tuesday to Saturday
    # (8:00 PM CDT Monday to Friday)
    - cron: "0 1 * * 2-6"

permissions:
  actions: write
  contents: write
  statuses: write
  id-token: write

defaults:
  run:
    shell: bash

env:
  XTS_PASS_GREP_PATTERN: "xts-pass-[0-9]*"
  PROMOTED_GREP_PATTERN: "build-.{5}"

jobs:
  determine-build-candidate:
    name: Fetch Latest Build Candidate
    runs-on: hl-cn-default-lin-sm
    outputs:
      build-candidate-exists: ${{ steps.find-build-candidates.outputs.build-candidate-exists }}
      build-candidate-commit: ${{ steps.find-build-candidates.outputs.build-candidate-commit }}
      promote-build-candidate: ${{ steps.find-build-candidates.outputs.promote-build-candidate }}
      promote-candidate-message: ${{ steps.find-build-candidates.outputs.promote-candidate-message }}
      promote-date: ${{ steps.find-build-candidates.outputs.promote-date }}
    if: ${{ github.event.repository.private == false }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      # Checkout the latest from dev
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
          ref: main
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Find Build Candidates
        id: find-build-candidates
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_PATTERN: ${{ env.XTS_PASS_GREP_PATTERN }}
          BUILD_PROMO_PATTERN: ${{ env.PROMOTED_GREP_PATTERN }}
        run: |
          PROMOTE_MSG="Found build candidate for promotion."
          PROMOTE_CANDIDATE="true"
          CANDIDATE_TAG="$(git tag --list --sort=-version:refname "${TAG_PATTERN}" | head --lines 1)"
          if [[ -n "${CANDIDATE_TAG}" ]]; then
            set +e
            CANDIDATE_COMMIT=$(git rev-list --max-count 1 ${CANDIDATE_TAG})
            BUILD_PROMOTED_TAGGED=$(git tag --contains "${CANDIDATE_COMMIT}" | grep -E "${BUILD_PROMO_PATTERN}")
            set -e

            # Use -n; if the BUILD_PROMOTED_TAGGED flag is not empty than the commit has been tagged.
            if [[ -n "${BUILD_PROMOTED_TAGGED}" ]]; then
              # Successful. No new commit to tag.
              PROMOTE_MSG="Candidate commit has already been promoted with tag(s): ${BUILD_PROMOTED_TAGGED}."
              PROMOTE_CANDIDATE="false"
            fi

            # Verify the commit is on main and continue
            if git branch --contains "${CANDIDATE_COMMIT}" | grep --quiet main >/dev/null 2>&1; then
              git push --delete origin $(git tag --list "${TAG_PATTERN}")
              git tag --delete $(git tag --list "${TAG_PATTERN}")
              echo "build-candidate-exists=true" >> "${GITHUB_OUTPUT}"
              echo "build-candidate-commit=${CANDIDATE_COMMIT}" >> "${GITHUB_OUTPUT}"
              echo "### Build Candidate Found" >>  "${GITHUB_STEP_SUMMARY}"
              echo "build-candidate-commit=${CANDIDATE_COMMIT}" >> "${GITHUB_STEP_SUMMARY}"
              echo "build-candidate-tag=${CANDIDATE_TAG}" >> "${GITHUB_STEP_SUMMARY}"
            else
              # Candidate commit is not on main. No promotion.
              PROMOTE_MSG="Candidate commit ${CANDIDATE_COMMIT} is not on main branch."
              PROMOTE_CANDIDATE="false"
            fi
          else
            # cancel the run if no candidate tag found
            PROMOTE_MSG="No build candidate tags found matching pattern: ${TAG_PATTERN}."
            PROMOTE_CANDIDATE="false"
          fi

          echo "promote-build-candidate=${PROMOTE_CANDIDATE}" | tee -a "${GITHUB_OUTPUT}"
          echo "promote-candidate-message=${PROMOTE_MSG}" | tee -a "${GITHUB_OUTPUT}"

          DATE=$(date +"%Y-%m-%d (%Z)")
          echo "promote-date=${DATE}" >> "${GITHUB_OUTPUT}"

          echo "### Promotion Decision" >> "${GITHUB_STEP_SUMMARY}"
          echo "${PROMOTE_MSG}" >> "${GITHUB_STEP_SUMMARY}"

  promote-build-candidate:
    name: Promote Build Candidate
    runs-on: hl-cn-default-lin-sm
    needs:
      - determine-build-candidate
    outputs:
      build-candidate-tag: ${{ steps.tag-build-candidate.outputs.build-candidate-tag }}
    if: ${{ needs.determine-build-candidate.outputs.promote-build-candidate == 'true' && needs.determine-build-candidate.outputs.build-candidate-exists == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout Tagged Code
        id: checkout-tagged-code
        if: ${{ needs.determine-build-candidate.outputs.build-candidate-exists == 'true' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
          ref: ${{ needs.determine-build-candidate.outputs.build-candidate-commit }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c86c374c0659a6c2d1284bccf8af889e73ce8fe0 # v6.3.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.SVCS_GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.SVCS_GPG_KEY_PASSPHRASE }}

      - name: Tag Build Candidate
        id: tag-build-candidate
        env:
          BUILD_INDEX: ${{ vars.XTS_BUILD_PROMOTION_INDEX }}
        run: |
          BUILD_TAG="$(printf "build-%05d" "${BUILD_INDEX}")"
          git tag --annotate ${BUILD_TAG} --message "chore: tagging commit for build promotion"
          git push --set-upstream origin --tags

          PREV_BUILD_TAG=$(printf "build-%05d" $((10#${BUILD_INDEX} - 1)))

          COMMIT_LIST="$(git log --pretty=format:"- [%h: %s](https://github.com/${{ github.repository }}/commit/%H)" "${PREV_BUILD_TAG}..${BUILD_TAG}")"

          echo "build-candidate-tag=${BUILD_TAG}" >> "${GITHUB_OUTPUT}"

          echo "### Build Promotion Tag Information" >> "${GITHUB_STEP_SUMMARY}"
          echo "build-tag=${BUILD_TAG}" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Commit List" >> "${GITHUB_STEP_SUMMARY}"
          echo "${COMMIT_LIST}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Increment Build Promotion Index
        uses: step-security/increment@f07ae8bfe2d5ddd67e68f0eb153010db6e5fdbd1 # v2.14.0
        id: increment
        with:
          name: "XTS_BUILD_PROMOTION_INDEX"
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Preview Next Build
        env:
          NEXT_BUILD_ID: ${{ steps.increment.outputs.value }}
        run: |
          NEXT_BUILD_TAG="$(printf "build-%05d" "${NEXT_BUILD_ID}")"
          echo "### Preview Next Build Tag" >> "${GITHUB_STEP_SUMMARY}"
          echo "Next build tag is: ${NEXT_BUILD_TAG}" >> "${GITHUB_STEP_SUMMARY}"

  deploy-ci-trigger:
    name: Trigger CI Flows
    runs-on: hl-cn-default-lin-sm
    needs:
      - promote-build-candidate
    if: ${{ needs.promote-build-candidate.result == 'success' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: "Trigger ZXF: [CITR] Single Day Performance Test (SDPT)"
        uses: step-security/workflow-dispatch@b4c1dc0afa074d0b4f0e653d3b80d4b2798599aa # v1.2.7
        with:
          workflow: .github/workflows/zxf-single-day-performance-test-controller.yaml
          repo: hiero-ledger/hiero-consensus-node # ensure we are executing in the hiero-ledger org
          ref: ${{ needs.promote-build-candidate.outputs.build-candidate-tag }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: "Trigger ZXF: [CITR] Single Day Longevity Test (SDLT)"
        uses: step-security/workflow-dispatch@b4c1dc0afa074d0b4f0e653d3b80d4b2798599aa # v1.2.7
        with:
          workflow: .github/workflows/zxf-single-day-longevity-test-controller.yaml
          repo: hiero-ledger/hiero-consensus-node # ensure we are executing in the hiero-ledger org
          ref: ${{ needs.promote-build-candidate.outputs.build-candidate-tag }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: "Trigger ZXF: [CITR] Single Day Canonical Test (SDCT)"
        uses: step-security/workflow-dispatch@b4c1dc0afa074d0b4f0e653d3b80d4b2798599aa # v1.2.7
        with:
          workflow: .github/workflows/zxf-single-day-canonical-test.yaml
          repo: hiero-ledger/hiero-consensus-node # ensure we are executing in the hiero-ledger org
          ref: ${{ needs.promote-build-candidate.outputs.build-candidate-tag }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          inputs: '{
            "build-tag": "${{ needs.promote-build-candidate.outputs.build-candidate-tag }}"
            }'

  report-promotion:
    name: Report Build Promotion
    runs-on: hl-cn-default-lin-sm
    needs:
      - determine-build-candidate
      - promote-build-candidate
    if: ${{ needs.promote-build-candidate.result == 'success' &&
      needs.determine-build-candidate.outputs.promote-build-candidate == 'true' &&
      needs.determine-build-candidate.outputs.build-candidate-exists == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Build Slack Payload Message
        id: payload
        run: |
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "#00FF00",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":tada: Hiero Consensus Node - Build Candidate Promoted (${{ needs.promote-build-candidate.outputs.build-candidate-tag }})",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Build Candidate Promotion Succeeded. See details below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Build Candidate Commit"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.determine-build-candidate.outputs.build-candidate-commit }}>"
                      },
                      {
                        "type": "plain_text",
                        "text": "Promoted Build Tag"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.promote-build-candidate.outputs.build-candidate-tag }}>"
                      },
                      {
                        "type": "plain_text",
                        "text": "Tag Date"
                      },
                      {
                          "type": "mrkdwn",
                          "text": "*${{ needs.determine-build-candidate.outputs.promote-date }}*"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "Workflow Run"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Report Promoted Build (slack citr-build-promotion-reports)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_BUILD_PROMOTION_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

  report-no-promotion:
    name: Report No Build Promotion
    runs-on: hl-cn-default-lin-sm
    needs:
      - determine-build-candidate
    if: ${{ needs.determine-build-candidate.outputs.promote-build-candidate == 'false' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Build Slack Payload Message
        id: payload
        run: |
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "#777777",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":bell: Hiero Consensus Node - No Build Candidate Promoted",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*No Build Candidate Promoted. See status below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Status:"
                      },
                      {
                        "type": "plain_text",
                        "text": "${{ needs.determine-build-candidate.outputs.promote-candidate-message }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Additional Information:*"
                    },
                    "fields":[
                      {
                        "type": "plain_text",
                        "text": "Date"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*${{ needs.determine-build-candidate.outputs.promote-date }}*"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Source Commit*: \n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow Run*: \n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Report No Promotion (slack citr-build-promotion-reports)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_BUILD_PROMOTION_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

      - name: Report No Promotion (slack release-team)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASE_TEAM_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

  report-failure:
    name: Report Build Promotion failure
    runs-on: hl-cn-default-lin-sm
    needs:
      - determine-build-candidate
      - promote-build-candidate
      - deploy-ci-trigger
      - report-promotion
    if:
      ${{ needs.determine-build-candidate.outputs.promote-build-candidate == 'true' &&
      (needs.determine-build-candidate.result != 'success' ||
      needs.promote-build-candidate.result != 'success' ||
      needs.deploy-ci-trigger.result != 'success' ||
      needs.report-promotion.result != 'success') && !cancelled() && always() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Build Rootly Summary
        id: rootly-summary
        run: |
          summary="The Promote Build Candidate job failed"
          if [[ -n "${{ needs.promote-build-candidate.outputs.build-candidate-tag }}" ]]; then
            summary="The Promote Build Candidate job failed (${{ needs.promote-build-candidate.outputs.build-candidate-tag }})."
          fi
          echo "summary=${summary}" >> "${GITHUB_OUTPUT}"
          {
            echo 'details<<EOF'
            echo "------------------------------------"
            echo "Status of each job:"
            echo "- Determine Build Candidate: ${{ needs.determine-build-candidate.result }}"
            echo "- Promote Build Candidate: ${{ needs.promote-build-candidate.result }}"
            echo "- Deploy CI Triggers: ${{ needs.deploy-ci-trigger.result }}"
            echo "- Report Promotion: ${{ needs.report-promotion.result }}"
            echo "------------------------------------"
            echo "Commit information:"
            echo "- Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.determine-build-candidate.outputs.build-candidate-commit }}>"
            echo "- Workflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Log Rootly Summary
        run: |
          echo "## Rootly Summary:"
          echo "### Summary: ${{ steps.rootly-summary.outputs.summary }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.rootly-summary.outputs.details }}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Report Failure (Rootly)
        uses: pandaswhocode/rootly-alert-action@fdae1529e5aed62040016accf719a0ceb7dae57f # v1.0.0
        continue-on-error: true
        with:
          api_key: ${{ secrets.ROOTLY_API_TOKEN }}
          summary: ${{ steps.rootly-summary.outputs.summary }}
          details: ${{ steps.rootly-summary.outputs.details }}
          notification_target_type: "Service"
          notification_target: "CI/CD Workflows"
          set_as_noise: "false"
          alert_urgency: "High"
          environments: "CITR"
          external_id: ${{ github.run_id }}
          external_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Build Slack Payload Message
        id: payload
        run: |
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "#FF0000",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":rotating_light: Hiero Consensus Node - Build Candidate Promotion Error Report",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Build Candidate Promotion Job Resulted in failure. See status below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Date"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*${{ needs.determine-build-candidate.outputs.promote-date }}*"
                      },
                      {
                        "type": "plain_text",
                        "text": "Fetch Latest Build Candidate"
                      },
                      {
                        "type": "plain_text",
                        "text": "${{ needs.determine-build-candidate.result }}"
                      },
                      {
                        "type": "plain_text",
                        "text": "Promote Build Candidate"
                      },
                      {
                        "type": "plain_text",
                        "text": "${{ needs.promote-build-candidate.result }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Additional Information:*"
                    },
                    "fields":[
                      {
                        "type": "mrkdwn",
                        "text": "*Source Commit*: \n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow Run*: \n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Report failure (slack citr-build-promotion-reports)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_BUILD_PROMOTION_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

      - name: Report failure (slack release-team)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASE_TEAM_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
