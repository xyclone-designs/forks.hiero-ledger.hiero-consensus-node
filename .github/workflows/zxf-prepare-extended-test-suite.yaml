# SPDX-License-Identifier: Apache-2.0
name: "ZXF: [CITR] Prepare Extended Test Suite"
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git Commit Reference for the XTS prep tag
        required: true
      dry-run-enabled:
        description: "If true, the workflow will not create a tag, but will validate the commit."
        required: false
        default: false
        type: boolean

defaults:
  run:
    shell: bash

permissions:
  actions: write
  contents: write
  statuses: write

env:
  XTS_CANDIDATE_TAG: "xts-candidate"
  XTS_PASS_GREP_PATTERN: "xts-pass-*"
  PROMOTED_GREP_PATTERN: "build-.{5}"

jobs:
  validate-input-ref:
    name: Validate Input Reference
    runs-on: hl-cn-default-lin-sm
    outputs:
      commit-is-present: ${{ steps.validate-input.outputs.commit_on_dev }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Default Branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
          ref: "main"
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Validate Input Ref
        id: validate-input
        env:
          COMMIT_ID: ${{ inputs.ref }}
        run: |
          if git merge-base --is-ancestor "${COMMIT_ID}" main >/dev/null 2>&1; then
            echo "commit_on_dev=true" >> "${GITHUB_OUTPUT}"
            echo "## Commit ${{ inputs.ref }} is present on main branch." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "::error title=Branch Alignment::The provided commit (${COMMIT_ID}) is not present on the main branch."
            echo "commit_on_dev=false" >> "${GITHUB_OUTPUT}"
            echo "## Commit ${{ inputs.ref }} not on main branch." >> "${GITHUB_STEP_SUMMARY}"
            echo "Skipping job: Tag for XTS promotion" >> "${GITHUB_STEP_SUMMARY}"
          fi

  tag-for-xts:
    name: Tag for XTS promotion
    runs-on: hl-cn-default-lin-sm
    needs:
      - validate-input-ref
    if: ${{ needs.validate-input-ref.outputs.commit-is-present == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c86c374c0659a6c2d1284bccf8af889e73ce8fe0 # v6.3.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.SVCS_GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.SVCS_GPG_KEY_PASSPHRASE }}

      # Check if this commit is already tagged in the XTS flow
      - name: Check if XTS flow is required
        id: check-xts-required
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_PATTERN: ${{ env.XTS_CANDIDATE_TAG }}
          XTS_PASS_PATTERN: ${{ env.XTS_PASS_GREP_PATTERN }}
          BUILD_PROMO_PATTERN: ${{ env.PROMOTED_GREP_PATTERN }}
        run: |
          set +e
          # Check if the HEAD ref is already tagged in the XTS workflows
          XTS_CANDIDATE_TAGGED=$(git tag --contains HEAD | grep -E "${CANDIDATE_PATTERN}")
          XTS_PASS_TAGGED=$(git tag --contains HEAD | grep -E "${XTS_PASS_PATTERN}")
          BUILD_PROMOTED_TAGGED=$(git tag --contains HEAD | grep -E "${BUILD_PROMO_PATTERN}")
          set -e

          # if the strings are not empty than the commit has been tagged.
          if [[ -n "${XTS_CANDIDATE_TAGGED}" || -n "${XTS_PASS_TAGGED}" || -n "${BUILD_PROMOTED_TAGGED}" ]]; then
            echo "Commit already tagged in XTS flow. Skipping remaining steps." >> "${GITHUB_STEP_SUMMARY}"
            echo "xts-checks-required=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Commit not yet tagged in XTS flow. Proceeding to tag for XTS." >> "${GITHUB_STEP_SUMMARY}"
            echo "xts-checks-required=true" >> "${GITHUB_OUTPUT}"
          fi

          # Log dry-run status
          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            echo "Dry run enabled. The workflow will not create a tag." >> "${GITHUB_STEP_SUMMARY}"
          fi

      # move the tag if successful
      - name: Tag Code and push
        if: ${{ steps.check-xts-required.outputs.xts-checks-required == 'true' && !inputs.dry-run-enabled }}
        run: |
          # Check if the tag exists
          set +e
          git rev-list -n 1 "${XTS_CANDIDATE_TAG}" >/dev/null 2>&1
          XTS_COMMIT_FOUND="${?}"
          set -e

          # Delete the tag if it does exist
          if [[ "${XTS_COMMIT_FOUND}" -eq 0 ]]; then
            git push --delete origin "${XTS_CANDIDATE_TAG}"
            git tag -d "${XTS_CANDIDATE_TAG}"
          fi

          # Create the new tag
          git tag --annotate "${XTS_CANDIDATE_TAG}" --message "chore: tagging commit for XTS promotion"
          git push --set-upstream origin --tags

  report-failures:
    name: Report Failures
    runs-on: hl-cn-default-lin-sm
    needs:
      - validate-input-ref
      - tag-for-xts
    if: ${{ (needs.validate-input-ref.result == 'failure' || needs.tag-for-xts.result == 'failure') && !cancelled() && always() }}
    steps:
      - name: Report Failure (Rootly)
        uses: pandaswhocode/rootly-alert-action@fdae1529e5aed62040016accf719a0ceb7dae57f # v1.0.0
        continue-on-error: true
        with:
          api_key: ${{ secrets.ROOTLY_API_TOKEN }}
          summary: "Hiero Consensus Node - XTS Candidate Tagging Failed"
          details: |
            The tagging of commit `${{ inputs.ref }}` for the Extended Test Suite (XTS) promotion has failed.
            Please investigate the issue to ensure the commit is properly tagged for further testing and deployment processes.
          notification_target_type: "Service"
          notification_target: "CI/CD Workflows"
          set_as_noise: "false"
          alert_urgency: "High"
          environments: "CITR"
          external_id: ${{ github.run_id }}
          external_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Report Failure (Slack)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_FAILURES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload: |
            {
              "attachments": [
                {
                  "color": "#FF0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": ":grey_exclamation: Hiero Consensus Node - XTS Candidate Tagging Failed",
                        "emoji": true
                      }
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Source Commit*: \n<${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.ref }}>"
                      }
                    }
                  ]
                }
              ]
            }
