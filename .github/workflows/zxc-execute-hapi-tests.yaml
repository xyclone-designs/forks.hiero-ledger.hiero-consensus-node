          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"
          checkout-token: "${{ secrets.access-token }}"
          setup-java: "true"
          java-version: "${{ inputs.java-version }}"
          java-distribution: "${{ inputs.java-distribution }}"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "${{ inputs.node-version }}"

      - name: HAPI Testing (State Throttling)
        id: gradle-hapi-state-throttling
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
        run: ${GRADLE_EXEC} hapiTestStateThrottling

      - name: Publish HAPI Test (State Throttling) Reports
        uses: step-security/publish-unit-test-result-action@7dff603bf17ef13dee847147bef8d7cd1728b566 # v2.22.0
        with:
          check_name: "Node: HAPI Test (State Throttling) Results"
          json_thousands_separator: ","
          junit_files: "**/test-clients/build/test-results/testSubprocess/TEST-*.xml"
          comment_mode: errors # only comment if we could not find or parse the JUnit XML files

      - name: Upload HAPI Test (State Throttling) Report Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: HAPI Test (State Throttling) Reports
          path: "**/test-clients/build/test-results/testSubprocess/TEST-*.xml"
          retention-days: 7

      - name: Check If Tests Executed (State Throttling)
        id: check-tests-executed-hapi-state-throttling
        if: ${{ !cancelled() }}
        run: |
          tests_executed="false"
          if find . -path "*/test-clients/build/test-executed/*.marker" 2>/dev/null | grep -q .; then
            tests_executed="true"
          fi
          echo "tests-executed=${tests_executed}" >> "${GITHUB_OUTPUT}"

      - name: Detect Flaky Tests (State Throttling)
        id: detect-flaky-hapi-state-throttling
        if: ${{ !cancelled() && steps.check-tests-executed-hapi-state-throttling.outputs.tests-executed == 'true' }}
        run: |
          has_flaky="false"
          if grep -rql "<flakyFailure" hedera-node/test-clients/build/test-results/ --include="TEST-*.xml" 2>/dev/null; then
            has_flaky="true"
          fi
          echo "has-flaky=${has_flaky}" >> "${GITHUB_OUTPUT}"

      - name: Upload HAPI Test (State Throttling) Network Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && inputs.enable-network-log-capture && (steps.gradle-hapi-state-throttling.conclusion == 'failure' || steps.detect-flaky-hapi-state-throttling.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (State Throttling) Network Logs
          path: |
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

      - name: Upload HAPI Test (State Throttling) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && (steps.gradle-hapi-state-throttling.conclusion == 'failure' || steps.detect-flaky-hapi-state-throttling.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (State Throttling) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/**/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

      - name: Set Failure Mode Output
        id: set-failure-mode
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.gradle-hapi-state-throttling.outcome || 'skipped' }}" == "success" \
             || "${{ steps.gradle-hapi-state-throttling.outcome || 'skipped' }}" == "skipped" ]]; then
            echo "failure-mode=none" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ steps.gradle-hapi-state-throttling.outcome || 'skipped' }}" == "failure" ]]; then
            echo "failure-mode=test" >> "${GITHUB_OUTPUT}"
          else
            echo "failure-mode=workflow" >> "${GITHUB_OUTPUT}"
          fi

  set-failure-mode:
    name: "Set Failure Mode"
    runs-on: hl-cn-default-lin-sm
    needs:
      - hapi-tests-misc
      - hapi-tests-misc-records-crypto-and-serial
      - hapi-tests-token-and-time-consuming
      - hapi-tests-simple-fees-and-nd-reconnect
      - hapi-tests-atomic-batch
      - hapi-tests-smart-contracts-and-iss
      - hapi-tests-restart
      - hapi-tests-bn-comms
      - hapi-tests-state-throttling
    if: ${{ !cancelled() && always() }} # always run unless cancelled
    outputs:
      failure-mode: ${{ steps.set-failure-mode.outputs.failure-mode }}
    steps:
      - name: Initialize GitHub Job
        uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1

      - name: Set Failure Mode
        id: set-failure-mode
        run: |
          job_statuses=(
            "${{ needs.hapi-tests-misc.result || 'skipped' }}"
            "${{ needs.hapi-tests-misc-records-crypto-and-serial.result || 'skipped' }}"
            "${{ needs.hapi-tests-token-and-time-consuming.result || 'skipped' }}"
            "${{ needs.hapi-tests-simple-fees-and-nd-reconnect.result || 'skipped' }}"
            "${{ needs.hapi-tests-atomic-batch.result || 'skipped' }}"
            "${{ needs.hapi-tests-smart-contracts-and-iss.result || 'skipped' }}"
            "${{ needs.hapi-tests-restart.result || 'skipped' }}"
            "${{ needs.hapi-tests-bn-comms.result || 'skipped' }}"
            "${{ needs.hapi-tests-state-throttling.result || 'skipped' }}"
          )

          # Must be kept in the same order as job_statuses above so the loop below
          # can index into both arrays consistently.
          job_failure_modes=(
            "${{ needs.hapi-tests-misc.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-misc-records-crypto-and-serial.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-token-and-time-consuming.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-simple-fees-and-nd-reconnect.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-atomic-batch.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-smart-contracts-and-iss.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-restart.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-bn-comms.outputs.failure-mode || 'none' }}"
            "${{ needs.hapi-tests-state-throttling.outputs.failure-mode || 'none' }}"
          )

          failure_mode="none"

          for i in "${!job_statuses[@]}"; do
            if [[ "${job_statuses[$i]}" == "failure" ]]; then
              mode="${job_failure_modes[$i]}"
              if [[ "${failure_mode}" == "none" ]]; then
                failure_mode="${mode}"
              elif [[ "${mode}" == "workflow" ]]; then
                failure_mode="workflow"
              fi
            fi
          done

          echo "failure-mode=${failure_mode}" >> "${GITHUB_OUTPUT}"
