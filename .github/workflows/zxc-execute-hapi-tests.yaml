      - name: Detect Flaky Tests (Misc Records)
        id: detect-flaky-hapi-misc-records
        if: ${{ !cancelled() && steps.check-tests-executed-hapi-misc-records.outputs.tests-executed == 'true' }}
        run: |
          has_flaky="false"
          if grep -rql "<flakyFailure" hedera-node/test-clients/build/test-results/ --include="TEST-*.xml" 2>/dev/null; then
            has_flaky="true"
          fi
          echo "has-flaky=${has_flaky}" >> "${GITHUB_OUTPUT}"

      - name: Upload HAPI Test (Misc Records) Network Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && inputs.enable-network-log-capture && (steps.gradle-hapi-misc-records.conclusion == 'failure' || steps.detect-flaky-hapi-misc-records.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (Misc Records) Network Logs
          path: |
            hedera-node/test-clients/build/hapi-test/**/output/**
            hedera-node/test-clients/build/hapi-test/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

      - name: Upload HAPI Test (Misc Records) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && (steps.gradle-hapi-misc-records.conclusion == 'failure' || steps.detect-flaky-hapi-misc-records.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (Misc Records) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
            hedera-node/test-clients/build/hapi-test/**/output/**
            hedera-node/test-clients/build/hapi-test/**/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

  hapi-tests-crypto:
