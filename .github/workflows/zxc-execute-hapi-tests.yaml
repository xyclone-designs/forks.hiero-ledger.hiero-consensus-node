# SPDX-License-Identifier: Apache-2.0
name: "ZXC: Execute HAPI Tests"
on:
  workflow_call:
    inputs:
      ref:
        description: "The branch, tag or SHA to checkout."
        required: false
        type: string
        default: ""
      java-distribution:
        description: "Java JDK Distribution:"
        type: string
        required: false
        default: "temurin"
      java-version:
        description: "Java JDK Version:"
        type: string
        required: false
        default: "25"
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "20"
      enable-network-log-capture:
        description: "Network Log Capture Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-misc:
        description: "HAPI Testing (misc) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-misc-records:
        description: "HAPI Testng (misc records) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-crypto:
        description: "HAPI Testing (crypto) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-simplefees:
        description: "HAPI Testing (simplefees) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-token:
        description: "HAPI Testing (token) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-smart-contract:
        description: "HAPI Testing (smart contract) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-time-consuming:
        description: "HAPI Testing (time consuming) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-restart:
        description: "HAPI Testing (restart) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-iss:
        description: "HAPI Testing (ISS) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-bn-communication:
        description: "HAPI Testing (Block Node Communication) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-nd-reconnect:
        description: "HAPI Testing (node death reconnect) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-atomic-batch:
        description: "HAPI Testing (atomic batch) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-state-throttling:
        description: "HAPI Testing (state throttling) Enabled"
        type: string
        required: false
        default: "false"
    secrets:
      access-token:
        description: "The GitHub access token used to checkout the repository, submodules, and make GitHub API calls."
        required: true
      gradle-cache-username:
        description: "The username used to authenticate with the Gradle Build Cache Node."
        required: true
      gradle-cache-password:
        description: "The password used to authenticate with the Gradle Build Cache Node."
        required: true
    outputs:
      failure-mode:
        description: "Failure Mode"
        value: ${{ jobs.set-failure-mode.outputs.failure-mode }}

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  actions: read
  pull-requests: write
  statuses: write
  checks: write
  contents: read

env:
  GRADLE_CACHE_USERNAME: ${{ secrets.gradle-cache-username }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.gradle-cache-password }}
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew
  CG_EXEC: ionice -c 2 -n 2 nice -n 19

jobs:
  hapi-tests-misc:
    name: "HAPI Tests (Misc)"
    if: ${{ inputs.enable-hapi-tests-misc == 'true' }}
    runs-on: hl-cn-hapi-lin-lg
    steps:
      - name: Prepare Runner
        uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"
          checkout-token: "${{ secrets.access-token }}"
          setup-java: "true"
          java-version: "${{ inputs.java-version }}"
          java-distribution: "${{ inputs.java-distribution }}"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "${{ inputs.node-version }}"

      - name: HAPI Testing (Misc)
        id: gradle-hapi-misc
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
        # Run each task in isolation with clean builds because we dynamically reconfigure Log4j for each mode
        run: ${GRADLE_EXEC} hapiTestMisc --no-daemon && ${GRADLE_EXEC} hapiTestMiscEmbedded --no-daemon && ${GRADLE_EXEC} hapiTestMiscRepeatable --no-daemon && ${GRADLE_EXEC} hapiTestMiscSerial --no-daemon

      - name: YahCLI Subprocess Regression Tests
        id: gradle-yahcli-misc
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
        run: ${GRADLE_EXEC} :yahcli:testSubprocess --no-daemon

      - name: Publish HAPI Test (Misc) Report
        uses: step-security/publish-unit-test-result-action@7dff603bf17ef13dee847147bef8d7cd1728b566 # v2.22.0
        with:
          check_name: "Node: HAPI Test (Misc) Results"
          json_thousands_separator: ","
          junit_files: |
            **/test-clients/build/test-results/**/TEST-*.xml
            **/yahcli/build/test-results/**/TEST-*.xml
          comment_mode: errors # only comment if we could not find or parse the JUnit XML files

      - name: Upload HAPI Test (Misc) Report Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: HAPI Test (Misc) Reports
          path: |
            **/test-clients/build/test-results/**/TEST-*.xml
            **/yahcli/build/test-results/**/TEST-*.xml
          retention-days: 7

      - name: Check If Tests Executed (Misc)
        id: check-tests-executed-hapi-misc
        if: ${{ !cancelled() }}
        run: |
          tests_executed="false"
          if find . -path "*/test-clients/build/test-executed/*.marker" -o -path "*/yahcli/build/test-executed/*.marker" 2>/dev/null | grep -q .; then
            tests_executed="true"
          fi
          echo "tests-executed=${tests_executed}" >> "${GITHUB_OUTPUT}"

      - name: Detect Flaky Tests (Misc)
        id: detect-flaky-hapi-misc
        if: ${{ !cancelled() && steps.check-tests-executed-hapi-misc.outputs.tests-executed == 'true' }}
        run: |
          has_flaky="false"
          if grep -rql "<flakyFailure" hedera-node/test-clients/build/test-results/ --include="TEST-*.xml" 2>/dev/null \
            || grep -rql "<flakyFailure" hedera-node/yahcli/build/test-results/ --include="TEST-*.xml" 2>/dev/null; then
            has_flaky="true"
          fi
          echo "has-flaky=${has_flaky}" >> "${GITHUB_OUTPUT}"

      - name: Upload HAPI Test (Misc) Network Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && inputs.enable-network-log-capture && (steps.gradle-hapi-misc.conclusion == 'failure' || steps.gradle-yahcli-misc.conclusion == 'failure' || steps.detect-flaky-hapi-misc.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (Misc) Network Logs
          path: |
            hedera-node/test-clients/build/hapi-test/**/output/**
            hedera-node/test-clients/build/hapi-test/*.log
            hedera-node/test-clients/output/**
            hedera-node/yahcli/build/hapi-test/**/output/**
            hedera-node/yahcli/build/hapi-test/**/*.log
          retention-days: 7

      - name: Upload HAPI Test (Misc) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && (steps.gradle-hapi-misc.conclusion == 'failure' || steps.gradle-yahcli-misc.conclusion == 'failure' || steps.detect-flaky-hapi-misc.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (Misc) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
            hedera-node/test-clients/build/hapi-test/**/output/**
            hedera-node/test-clients/build/hapi-test/**/*.log
            hedera-node/test-clients/output/**
            hedera-node/yahcli/build/reports/tests/testSubprocess/**
            hedera-node/yahcli/build/hapi-test/**/output/**
            hedera-node/yahcli/build/hapi-test/**/*.log
          retention-days: 7

  hapi-tests-misc-records:
    name: "HAPI Tests (Misc Records)"
    if: ${{ inputs.enable-hapi-tests-misc-records == 'true' }}
    runs-on: hl-cn-hapi-lin-xl
    steps:
      - name: Prepare Runner
        uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
